name: Release

# Manually dispatched from `main`. Builds the macOS / Windows / Linux
# bundles in parallel, attaches them to a single draft release, and
# publishes when all three platforms succeed.
#
# Why dispatch-from-main instead of a `v*` tag push: the GitHub Actions
# cache (used by both sccache's GHA backend and Swatinem/rust-cache) is
# scoped server-side by git ref. A run can only restore caches written
# on its own ref or the default branch. Tag pushes each land on a fresh
# `refs/tags/vX` ref, so no release could ever restore the previous
# release's cache — the entire dependency tree (tauri, russh, tokio,
# stronghold, the Zig VT engine) recompiled every single release.
# Running on `main` (the default branch) means release N+1 restores the
# cache release N wrote. No warm job, no extra builds, no external
# cache infra — releases just chain their caches.
#
# To cut a release: bump the version in src-tauri/tauri.conf.json (and
# Cargo.toml / package.json), commit to main, then run this workflow
# from the Actions tab or `gh workflow run release.yml --ref main`.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.7). Leave blank to use src-tauri/tauri.conf.json.'
        required: false
        default: ''

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create draft release
    # Hard-stop if dispatched from anything but the default branch:
    # the whole point of approach A is that the run sits on
    # refs/heads/main so its cache is restorable by the next release.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: version
        run: |
          v='${{ github.event.inputs.version }}'
          if [ -z "$v" ]; then
            v=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed -E 's/.*"version" *: *"([^"]+)".*/\1/')
          fi
          if [ -z "$v" ]; then
            echo "::error::Could not resolve a version (input blank and tauri.conf.json parse failed)"
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing v$v"

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        env:
          VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const tag = `v${process.env.VERSION}`;
            // Fail loudly if this version was already released, rather
            // than silently building a duplicate.
            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setFailed(`Release ${tag} already exists — bump the version first.`);
              return;
            } catch (e) {
              if (e.status !== 404) throw e;
            }
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              // The tag does not exist yet; GitHub creates a lightweight
              // tag at this commit (the main SHA this run dispatched on).
              target_commitish: context.sha,
              name: `Prmpt ${tag}`,
              body: 'See attached bundles for installers / archives. Built from `' + tag + '` (' + context.sha.slice(0, 7) + ').',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build (${{ matrix.platform.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macOS-14 is ARM (M1); produces a universal binary by adding
          # the x86_64 target below. Use `args: ''` to skip universal
          # if a single-arch build is preferred.
          - label: macOS (universal)
            os: macos-14
            family: macos
            arch: universal
            args: '--target universal-apple-darwin'
            extra_rust_targets: 'x86_64-apple-darwin,aarch64-apple-darwin'

          - label: Linux x86_64
            os: ubuntu-22.04
            family: linux
            arch: x86_64
            args: ''
            extra_rust_targets: ''

          # Native ARM Linux runner (no cross-compile gymnastics with
          # webkit2gtk / Zig). Host triple is aarch64-unknown-linux-gnu,
          # so dtolnay/rust-toolchain installs that as default.
          - label: Linux aarch64
            os: ubuntu-22.04-arm
            family: linux
            arch: aarch64
            args: ''
            extra_rust_targets: ''

          - label: Windows x86_64
            os: windows-latest
            family: windows
            arch: x86_64
            args: ''
            extra_rust_targets: ''

          # Native ARM Windows runner. Host triple is
          # aarch64-pc-windows-msvc; WebView2 ARM64 runtime is bundled
          # in Windows 11, and tauri-bundler emits ARM64 MSI/NSIS.
          - label: Windows aarch64
            os: windows-11-arm
            family: windows
            arch: aarch64
            args: ''
            extra_rust_targets: ''

    runs-on: ${{ matrix.platform.os }}

    env:
      # Route rustc through sccache (the Setup sccache step provides the
      # binary and points SCCACHE_GHA_* at the Actions cache backend).
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
      # Incremental compilation is dead weight on a fresh CI checkout
      # (nothing to be incremental against) and is incompatible with
      # sccache — turning it off shrinks the cache and lets sccache hit.
      CARGO_INCREMENTAL: '0'

    steps:
      # libghostty-rs is a git submodule consumed via a `[patch]` path
      # dependency in src-tauri/Cargo.toml. Without `submodules: recursive`
      # the path is empty and cargo fails to read its Cargo.toml.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        if: matrix.platform.family == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            wget \
            libfuse2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Empty string is accepted and means "no extra targets".
          targets: ${{ matrix.platform.extra_rust_targets }}

      # artifact-signing-cli (the Azure Trusted Signing tool Tauri's docs
      # recommend) shells out to signtool and the Azure Code Signing Dlib,
      # which need the .NET 8 runtime. windows-latest ships it, but pin it
      # explicitly so both Windows legs (incl. the native windows-11-arm
      # runner) are deterministic. No-op on macOS/Linux legs.
      - name: Setup .NET 8 (Windows, for artifact-signing-cli)
        if: matrix.platform.family == 'windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      # artifact-signing-cli always drives the x64 signtool + x64
      # Azure.CodeSigning.Dlib, which need the x64 .NET 8 *runtime*. The
      # windows-11-arm runner only has arm64 .NET, so the x64 dlib can't load
      # its runtime and signtool exits with code 3. Install the x64 runtime to
      # a dedicated dir (xcopy install — no registry) and point the x64 .NET
      # host at it via DOTNET_ROOT_X64, which hostfxr checks ahead of
      # DOTNET_ROOT for x64 processes; the bundle step's signtool inherits it.
      - name: Install x64 .NET 8 runtime (Windows arm64, for x64 signtool)
        if: ${{ matrix.platform.family == 'windows' && matrix.platform.arch == 'aarch64' }}
        shell: powershell
        run: |
          $dir = Join-Path $env:RUNNER_TEMP 'dotnet-x64'
          & ([scriptblock]::Create((Invoke-RestMethod 'https://dot.net/v1/dotnet-install.ps1'))) `
            -Architecture x64 -Runtime dotnet -Channel 8.0 -InstallDir $dir
          "DOTNET_ROOT_X64=$dir" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "installed x64 .NET runtime to $dir"
          & "$dir\dotnet.exe" --list-runtimes

      # sccache caches individual `rustc` invocations to the GitHub
      # Actions cache, so the large dependency tree (tauri, russh,
      # tokio, stronghold, objc2/windows/secret-service, …) is reused
      # across releases and — on macOS — across the two universal-binary
      # arches. It does NOT wrap build scripts, so it does not cover the
      # Zig VT-engine compile; rust-cache's cache-all-crates handles that.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          # Distinct cache per matrix platform so the macOS universal
          # build (two rustc targets) doesn't share a key with Linux
          # or Windows.
          key: ${{ matrix.platform.label }}
          # Keep a partial cache around if the build fails partway —
          # otherwise a flaky tauri bundle step wipes hours of work.
          cache-on-failure: true
          # libghostty-vt / -sys are [patch] path deps into the pinned
          # submodule. Without this, rust-cache treats them like local
          # crates and drops their artifacts — including the expensive
          # Zig-compiled libghostty-vt-sys build-script output — so the
          # VT engine recompiles every release on every OS. Keep them.
          cache-all-crates: true

      # libghostty-vt-sys's build.rs invokes Zig to compile Ghostty's
      # vendored VT engine. Must match the version in CLAUDE.md.
      # Note: @v1 of this action is deprecated and its mirror index was
      # last updated May 2024, so it 404s on Zig releases past 0.13.x —
      # pin to @v2 instead.
      # v2's default `use-cache: true` caches ZIG_GLOBAL_CACHE_DIR, so
      # repeat Zig invocations from libghostty-vt-sys are warm.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'
          cache-key: ${{ matrix.platform.label }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # setup-bun caches the Bun toolchain but NOT `bun install`'s
      # package cache. ~/.bun/install/cache works on all three OSes
      # (Bun normalizes the path on Windows too).
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # tauri-bundler's notarization shells out to `xcrun notarytool`
      # with `--issuer $APPLE_API_ISSUER --key-id $APPLE_API_KEY
      # --key $APPLE_API_KEY_PATH`, where --key must be a *path to the
      # .p8 file*. The APPLE_API_KEY_PATH secret actually holds the .p8
      # *body*, so passing it straight through fed notarytool a
      # multi-line PEM as the --key path ("Error: Invalid option").
      # Materialize that body into a 0600 temp file and point
      # APPLE_API_KEY_PATH at the file instead.
      - name: Provision Apple notarization key
        if: matrix.platform.family == 'macos'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/apple_api_key.p8"
          printf '%s\n' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/apple_api_key.p8"

      # Lays the prmpt fork patch (libghostty-vt-sys.patch) onto the
      # pinned submodule. Required before any cargo build — the build.rs
      # in libghostty-vt-sys depends on it. Idempotent.
      - name: Apply libghostty-rs fork patch
        run: bun run setup-vendor

      # Azure Trusted Signing for the Windows bundles. tauri-bundler signs the
      # app .exe + the NSIS/MSI installers mid-build by invoking the
      # bundle.windows.signCommand (%1 = file path). We can't put that command
      # in tauri.conf.json / tauri.windows.conf.json — those apply to every
      # Windows build (incl. local/contributor builds) and would fail without
      # Azure creds + tooling. Instead generate a CI-only overlay config here
      # and pass it via --config (see SIGN_CONFIG_ARG below).
      #
      # Backward compatible: with no AZURE_CLIENT_ID secret set, this step
      # no-ops and the Windows legs build today's UNSIGNED bundles unchanged.
      - name: Configure Azure Trusted Signing (Windows)
        if: matrix.platform.family == 'windows'
        shell: bash
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          # The job sets RUSTC_WRAPPER=sccache; route this one-off tool build
          # around it. sccache buys nothing for a `cargo install` and its GHA
          # cache backend can hard-fail the step during a cache-service blip.
          RUSTC_WRAPPER: ''
          SCCACHE_GHA_ENABLED: 'false'
        run: |
          set -euo pipefail
          if [ -z "${AZURE_CLIENT_ID:-}" ]; then
            echo "::warning::AZURE_CLIENT_ID unset — building UNSIGNED Windows bundle."
            exit 0
          fi
          # artifact-signing-cli shells out to signtool but doesn't bundle it.
          # The Windows SDK ships signtool under a versioned, per-arch dir that
          # isn't on PATH — locate the newest and prepend it (via GITHUB_PATH)
          # so the later bundle/sign step can find it.
          arch=x64
          [ "${RUNNER_ARCH:-}" = "ARM64" ] && arch=arm64
          sdkbin="/c/Program Files (x86)/Windows Kits/10/bin"
          stdir=$(ls -d "$sdkbin"/10.*/"$arch" 2>/dev/null | sort -V | tail -1 || true)
          if [ -n "${stdir:-}" ] && [ -f "$stdir/signtool.exe" ]; then
            cygpath -w "$stdir" >> "$GITHUB_PATH"
          else
            echo "::warning::signtool.exe not found under $sdkbin/10.*/$arch — signing will fail."
          fi
          # Resolve an absolute path to a PowerShell. We don't rely on PATH:
          # `powershell` (5.1) is on the x86_64 runner's PATH but the
          # windows-11-arm runner may lack it entirely and ship only pwsh 7
          # (whose path contains a space). The signCommand below uses the
          # {cmd,args} object form, so an absolute path — space or not —
          # is invoked directly without PATH lookup or whitespace splitting.
          PS_EXE=""
          for cand in \
            "/c/Windows/System32/WindowsPowerShell/v1.0/powershell.exe" \
            "/c/Program Files/PowerShell/7/pwsh.exe" \
            "$(command -v pwsh 2>/dev/null || true)" \
            "$(command -v powershell 2>/dev/null || true)"; do
            if [ -n "$cand" ] && [ -f "$cand" ]; then PS_EXE="$cand"; break; fi
          done
          if [ -z "$PS_EXE" ]; then
            echo "::error::no PowerShell (powershell.exe / pwsh.exe) found on the runner"
            exit 1
          fi
          echo "signing via: $(cygpath -w "$PS_EXE")"
          cargo install artifact-signing-cli --locked
          # Retry wrapper with verbose logging. tauri-bundler signs many PE
          # files per MSI/NSIS bundle in rapid succession and Azure Trusted
          # Signing intermittently throttles one request, so retry with
          # backoff. Everything is appended to $RUNNER_TEMP/artifact-sign.log
          # and printed by the "Show signing log" step, because tauri captures
          # the signCommand output and only re-emits it on success — so an
          # internal failure would otherwise be invisible. Resource coords and
          # SP creds are read from the bundle step's env at run time. Quoted
          # heredoc (<<'PS_EOF') → the script is written verbatim, no shell
          # expansion, so no \$ escaping.
          cat > src-tauri/sign.ps1 <<'PS_EOF'
          param([Parameter(Mandatory=$true)][string]$File)
          $ErrorActionPreference = 'Continue'
          $log = Join-Path $env:RUNNER_TEMP 'artifact-sign.log'
          function Log($m) { $l = "[sign] $m"; Write-Host $l; Add-Content -LiteralPath $log -Value $l }
          Log "=== signing: $File ==="
          Log "powershell $($PSVersionTable.PSVersion) ($($PSVersionTable.PSEdition))"
          Log ("artifact-signing-cli -> " + (Get-Command artifact-signing-cli -ErrorAction SilentlyContinue).Source)
          Log ("signtool -> " + (Get-Command signtool -ErrorAction SilentlyContinue).Source)
          Log "creds present: tenant=$([bool]$env:AZURE_TENANT_ID) client=$([bool]$env:AZURE_CLIENT_ID) secret=$([bool]$env:AZURE_CLIENT_SECRET)"
          Log "endpoint=$env:TS_ENDPOINT account=$env:TS_ACCOUNT profile=$env:TS_PROFILE"
          Log "dotnet: ROOT_X64=$env:DOTNET_ROOT_X64 ROOT=$env:DOTNET_ROOT"
          for ($i = 1; $i -le 5; $i++) {
            Log "attempt $i ..."
            $out = & artifact-signing-cli -e $env:TS_ENDPOINT -a $env:TS_ACCOUNT -c $env:TS_PROFILE $File 2>&1
            $rc = $LASTEXITCODE
            foreach ($line in $out) { Log $line }
            if ($rc -eq 0) { Log "attempt $i succeeded"; exit 0 }
            Log "attempt $i failed (exit $rc); retrying in $($i * 5)s..."
            Start-Sleep -Seconds ($i * 5)
          }
          Log "signing FAILED after 5 attempts: $File"
          exit 1
          PS_EOF
          # Build the overlay config with jq (handles JSON backslash-escaping
          # of the Windows paths) using signCommand's {cmd,args} OBJECT form:
          # no whitespace splitting, no PATH lookup, no relative-path rewrite.
          # %1 in args is still substituted by tauri with each file to sign.
          ps_win="$(cygpath -w "$PS_EXE")"
          script_win="$(cygpath -w "$PWD/src-tauri/sign.ps1")"
          jq -n --arg cmd "$ps_win" --arg script "$script_win" \
            '{bundle:{windows:{signCommand:{cmd:$cmd,args:["-NoProfile","-ExecutionPolicy","Bypass","-File",$script,"%1"]}}}}' \
            > src-tauri/tauri.signing.conf.json
          echo "SIGN_CONFIG_ARG=--config src-tauri/tauri.signing.conf.json" >> "$GITHUB_ENV"

      - name: Build & upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub's ubuntu-22.04 runner has no FUSE 2, so linuxdeploy
          # (an AppImage) can't mount itself and AppImage bundling fails
          # with "failed to run linuxdeploy". This makes all AppImage
          # tools self-extract instead of mounting via FUSE. No-op on
          # macOS/Windows legs.
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Even with FUSE resolved, linuxdeploy's strip pass aborts the
          # whole run ("failed to run linuxdeploy") when it can't strip
          # one of the staged binaries — the Zig-produced libghostty-vt
          # (non-standard section layout) and the webkit2gtk libs are
          # common offenders. Stripping only trims the AppImage; skip it
          # so bundling succeeds. No-op on macOS/Windows legs.
          NO_STRIP: true
          # Apple code signing + notarization. Only the macOS leg has
          # these secrets populated; on the Ubuntu/Windows legs they
          # resolve to empty strings and tauri-action skips signing, so
          # those builds are unchanged. See plan C1-C4 for how to obtain
          # and set these repo secrets.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_API_KEY = short App Store Connect Key ID (NOT the .p8
          # body). APPLE_API_KEY_PATH is the file written by the
          # "Provision Apple notarization key" step above — never a
          # secret, since the path must resolve on this runner.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple_api_key.p8
          # Updater signing. With these set + bundle.createUpdaterArtifacts
          # true, tauri-action signs each bundle, writes a `.sig`, and
          # generates/uploads `latest.json` to the draft release (merging
          # the three platforms' entries across the matrix legs).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Azure Trusted Signing service-principal creds. Read by
          # artifact-signing-cli (the signCommand) via DefaultAzureCredential
          # → EnvironmentCredential — no `az login` needed. Empty on the
          # macOS/Linux legs (those don't run the signCommand), so harmless.
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          # Non-secret Trusted Signing coords, read by sign.ps1 at run time.
          TS_ENDPOINT: 'https://weu.codesigning.azure.net'
          TS_ACCOUNT: 'DSS-Net'
          TS_PROFILE: 'Digital-Services-Stephan'
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          # SIGN_CONFIG_ARG is set only by the "Configure Azure Trusted
          # Signing" step (Windows + secret present); otherwise it's unset and
          # renders empty, leaving the build unchanged.
          args: ${{ matrix.platform.args }} ${{ env.SIGN_CONFIG_ARG }}

      # sign.ps1 logs every signing attempt (and the signer's own output) to
      # this file. tauri only re-emits the signCommand output on success, so on
      # failure this is the only place the real error shows. Runs even when the
      # bundle step failed.
      - name: Show signing log (Windows)
        if: ${{ always() && matrix.platform.family == 'windows' }}
        shell: bash
        run: |
          f="$RUNNER_TEMP/artifact-sign.log"
          if [ -f "$f" ]; then
            echo "===== artifact-sign.log ====="
            cat "$f"
          else
            echo "no signing log at $f (signCommand may not have run)"
          fi

      # linuxdeploy-plugin-gtk bundles the host's libwayland-* into the
      # AppImage. libwayland is tied to the running compositor, so on a
      # user machine whose libwayland differs the bundled copy shadows
      # the host's and WebKitGTK's EGL display creation dies with
      # "Could not create default EGL display: EGL_BAD_PARAMETER" — the
      # window opens but the webview never paints (terminal + home view
      # blank). The .deb/.rpm have no bundled libs and work fine. Fix:
      # strip libwayland-*.so* from the AppImage so it uses the host's,
      # repack, and replace the asset tauri-action already uploaded.
      # (im-wayland*.so are GTK input-method modules, NOT libwayland —
      # leave them.) Verified end-to-end in a Linux container repro.
      - name: Fix AppImage (strip bundled libwayland, repack, replace)
        if: matrix.platform.family == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.create-release.outputs.version }}
          APPIMAGE_EXTRACT_AND_RUN: 1
          ARCH: ${{ matrix.platform.arch }}
          # The repack rewrites the AppImage bytes, so tauri-action's
          # signature no longer verifies. Re-sign with the same key
          # (the signer reads these env vars automatically).
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          appimage=$(ls src-tauri/target/release/bundle/appimage/*.AppImage | head -1)
          # Absolute path: later steps cd into $work, so a repo-relative
          # path would no longer resolve (breaks the verify subshell).
          appimage=$(readlink -f "$appimage")
          echo "Repacking $appimage"
          work=$(mktemp -d)
          cp "$appimage" "$work/orig.AppImage"
          ( cd "$work" && ./orig.AppImage --appimage-extract >/dev/null )
          before=$(ls "$work"/squashfs-root/usr/lib | grep -E '^libwayland-.*\.so' || true)
          echo "stripping: ${before:-<none found>}"
          rm -f "$work"/squashfs-root/usr/lib/libwayland-*.so*
          curl -sSfL -o "$work/appimagetool" \
            "https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-${ARCH}.AppImage"
          chmod +x "$work/appimagetool"
          # Overwrite in place so the asset name is unchanged.
          "$work/appimagetool" --no-appstream "$work/squashfs-root" "$appimage"
          # Sanity: repack must be a valid AppImage with no libwayland.
          ( cd "$work" && mkdir verify && cd verify \
            && "$appimage" --appimage-extract >/dev/null \
            && ! ls squashfs-root/usr/lib | grep -qE '^libwayland-.*\.so' )
          # Re-sign the repacked AppImage so its updater signature
          # matches the new bytes. Overwrites the stale .sig in place.
          bun run tauri signer sign "$appimage"
          echo "Replacing release assets $(basename "$appimage") + .sig"
          gh release upload "v${VERSION}" "$appimage" "${appimage}.sig" --clobber
          rm -rf "$work"

  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      # tauri-action wrote latest.json with the signature of each AppImage
      # *before* the libwayland repack. Now that all matrix legs are done
      # (no clobber race), re-point each linux-* platform key at the
      # re-signed sig that the corresponding Linux leg uploaded. jq + gh
      # are preinstalled on ubuntu-latest. Filename → key mapping covers
      # both tauri-bundler naming styles (`_amd64` / `_aarch64` for AppImage,
      # `_x86_64` / `_arm64` historically) so a future bundler change
      # doesn't silently leave stale signatures.
      - name: Patch latest.json with re-signed Linux signatures
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # No actions/checkout in this job, so gh can't infer the repo
          # from git. Set it explicitly.
          GH_REPO: ${{ github.repository }}
          VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          set -euo pipefail
          work=$(mktemp -d)
          cd "$work"
          gh release download "v${VERSION}" -p latest.json -p "*.AppImage.sig" --clobber
          for sig in ./*.AppImage.sig; do
            name=$(basename "$sig")
            case "$name" in
              *amd64*|*x86_64*) key="linux-x86_64" ;;
              *aarch64*|*arm64*) key="linux-aarch64" ;;
              *)
                echo "::warning::cannot infer arch from $name, skipping"
                continue ;;
            esac
            sigval=$(cat "$sig")
            jq --arg s "$sigval" --arg k "$key" \
              '.platforms[$k].signature = $s' latest.json > latest.json.new
            mv latest.json.new latest.json
            echo "patched $key from $name"
          done
          gh release upload "v${VERSION}" latest.json --clobber

      - name: Mark release as non-draft
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              make_latest: 'true',
            });
