name: Release

# Trigger on any version-style tag push. Builds the macOS / Windows /
# Linux bundles in parallel, attaches them to a single draft release,
# and publishes when all three platforms succeed.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v4

      - name: Create draft release
        id: create
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Prmpt ${tag}`,
              body: 'See attached bundles for installers / archives. Built from tag `' + tag + '`.',
              draft: true,
              prerelease: false,
            });
            return data.id;

  build:
    name: Build (${{ matrix.platform.label }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        platform:
          # macOS-14 is ARM (M1); produces a universal binary by adding
          # the x86_64 target below. Use `args: ''` to skip universal
          # if a single-arch build is preferred.
          - label: macOS (universal)
            os: macos-14
            args: '--target universal-apple-darwin'
            extra_rust_targets: 'x86_64-apple-darwin,aarch64-apple-darwin'

          - label: Linux x86_64
            os: ubuntu-22.04
            args: ''
            extra_rust_targets: ''

          - label: Windows x86_64
            os: windows-latest
            args: ''
            extra_rust_targets: ''

    runs-on: ${{ matrix.platform.os }}

    env:
      # Route rustc through sccache (the Setup sccache step provides the
      # binary and points SCCACHE_GHA_* at the Actions cache backend).
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'
      # Incremental compilation is dead weight on a fresh CI checkout
      # (nothing to be incremental against) and is incompatible with
      # sccache — turning it off shrinks the cache and lets sccache hit.
      CARGO_INCREMENTAL: '0'

    steps:
      # libghostty-rs is a git submodule consumed via a `[patch]` path
      # dependency in src-tauri/Cargo.toml. Without `submodules: recursive`
      # the path is empty and cargo fails to read its Cargo.toml.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build dependencies
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            file \
            wget

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Empty string is accepted and means "no extra targets".
          targets: ${{ matrix.platform.extra_rust_targets }}

      # sccache caches individual `rustc` invocations to the GitHub
      # Actions cache, so the large dependency tree (tauri, russh,
      # tokio, stronghold, objc2/windows/secret-service, …) is reused
      # across releases and — on macOS — across the two universal-binary
      # arches. It does NOT wrap build scripts, so it does not cover the
      # Zig VT-engine compile; rust-cache's cache-all-crates handles that.
      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'
          # Distinct cache per matrix platform so the macOS universal
          # build (two rustc targets) doesn't share a key with Linux
          # or Windows.
          key: ${{ matrix.platform.label }}
          # Keep a partial cache around if the build fails partway —
          # otherwise a flaky tauri bundle step wipes hours of work.
          cache-on-failure: true
          # libghostty-vt / -sys are [patch] path deps into the pinned
          # submodule. Without this, rust-cache treats them like local
          # crates and drops their artifacts — including the expensive
          # Zig-compiled libghostty-vt-sys build-script output — so the
          # VT engine recompiles every release on every OS. Keep them.
          cache-all-crates: true

      # libghostty-vt-sys's build.rs invokes Zig to compile Ghostty's
      # vendored VT engine. Must match the version in CLAUDE.md.
      # Note: @v1 of this action is deprecated and its mirror index was
      # last updated May 2024, so it 404s on Zig releases past 0.13.x —
      # pin to @v2 instead.
      # v2's default `use-cache: true` caches ZIG_GLOBAL_CACHE_DIR, so
      # repeat Zig invocations from libghostty-vt-sys are warm.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: '0.15.2'
          cache-key: ${{ matrix.platform.label }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      # setup-bun caches the Bun toolchain but NOT `bun install`'s
      # package cache. ~/.bun/install/cache works on all three OSes
      # (Bun normalizes the path on Windows too).
      - name: Cache bun install
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      # tauri-bundler's notarization shells out to `xcrun notarytool`
      # with `--issuer $APPLE_API_ISSUER --key-id $APPLE_API_KEY
      # --key $APPLE_API_KEY_PATH`, where --key must be a *path to the
      # .p8 file*. The APPLE_API_KEY_PATH secret actually holds the .p8
      # *body*, so passing it straight through fed notarytool a
      # multi-line PEM as the --key path ("Error: Invalid option").
      # Materialize that body into a 0600 temp file and point
      # APPLE_API_KEY_PATH at the file instead.
      - name: Provision Apple notarization key
        if: matrix.platform.os == 'macos-14'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_PATH }}
        run: |
          install -m 600 /dev/null "$RUNNER_TEMP/apple_api_key.p8"
          printf '%s\n' "$APPLE_API_KEY_P8" > "$RUNNER_TEMP/apple_api_key.p8"

      # Lays the prmpt fork patch (libghostty-vt-sys.patch) onto the
      # pinned submodule. Required before any cargo build — the build.rs
      # in libghostty-vt-sys depends on it. Idempotent.
      - name: Apply libghostty-rs fork patch
        run: bun run setup-vendor

      - name: Build & upload Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub's ubuntu-22.04 runner has no FUSE 2, so linuxdeploy
          # (an AppImage) can't mount itself and AppImage bundling fails
          # with "failed to run linuxdeploy". This makes all AppImage
          # tools self-extract instead of mounting via FUSE. No-op on
          # macOS/Windows legs.
          APPIMAGE_EXTRACT_AND_RUN: 1
          # Apple code signing + notarization. Only the macOS leg has
          # these secrets populated; on the Ubuntu/Windows legs they
          # resolve to empty strings and tauri-action skips signing, so
          # those builds are unchanged. See plan C1-C4 for how to obtain
          # and set these repo secrets.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_API_KEY = short App Store Connect Key ID (NOT the .p8
          # body). APPLE_API_KEY_PATH is the file written by the
          # "Provision Apple notarization key" step above — never a
          # secret, since the path must resolve on this runner.
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/apple_api_key.p8
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.platform.args }}

  publish-release:
    name: Publish release
    needs: [create-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Mark release as non-draft
        uses: actions/github-script@v7
        env:
          RELEASE_ID: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: Number(process.env.RELEASE_ID),
              draft: false,
              make_latest: 'true',
            });
