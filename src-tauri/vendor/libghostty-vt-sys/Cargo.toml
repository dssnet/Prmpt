[package]
name = "libghostty-vt-sys"
description = "Raw FFI bindings for libghostty-vt, the Ghostty terminal emulation library (vendored fork with extra cross-compile targets)"
version = "0.1.1"
edition = "2024"
license = "MIT OR Apache-2.0"
repository = "https://github.com/uzaaft/libghostty-rs"
rust-version = "1.93"
links = "ghostty-vt"
build = "build.rs"

[features]
default = ["vendored"]
vendored = []
bindgen-tool = ["dep:bindgen", "dep:libc"]

[dependencies]
bindgen = { version = "0.72.1", optional = true }
libc = { version = "0.2", optional = true }

[lib]
name = "libghostty_vt_sys"
path = "src/lib.rs"

[[bin]]
name = "gen-bindings"
path = "tools/gen_bindings.rs"
required-features = ["bindgen-tool"]
